name: Monthly data refresh

on:
  schedule:
    # 06:00 UTC on the 3rd of each month (last month's pageviews are final by then)
    - cron: "0 6 3 * *"
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Refresh pageviews + word counts
        run: python3 refresh.py

      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cats_data.json cats.csv cats_by_popularity.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Monthly data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
